name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort

      - name: Run Black formatter check
        run: black --check . --exclude="\.git|\.venv" 2>/dev/null || true

      - name: Run isort import sorting check
        run: isort --check-only . --skip-glob="\.git" --skip-glob="\.venv" 2>/dev/null || true

      - name: Run Flake8 linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,.venv,.terraform,node_modules

      - name: Run Pylint linting
        run: |
          find . -type f -name "*.py" -not -path "./.git/*" -not -path "./.venv/*" -not -path "./.terraform/*" | xargs pylint --fail-under=8.0 2>/dev/null || true

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pythonapp
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          pip install pytest pytest-cov pytest-asyncio

      - name: Create directories if needed
        run: |
          mkdir -p tests
          mkdir -p app

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://admin:testpass123@localhost:5432/pythonapp
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v 2>/dev/null || echo "No tests found or test execution skipped"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            coverage.html
            .coverage
          retention-days: 30

  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Terraform Format Check
        run: |
          cd infra
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infra
          terraform validate

      - name: Terraform Security Check (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.2
        with:
          working_directory: infra
          format: sarif
          out_dir: ./tfsec-results
        continue-on-error: true

      - name: Upload tfsec results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./tfsec-results/tfsec.sarif
        continue-on-error: true

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend=false
        continue-on-error: true

      - name: Terraform Plan
        id: terraform_plan
        run: |
          cd infra
          terraform plan -no-color -out=tfplan > plan_output.txt 2>&1 || echo "Plan completed with warnings"
          cat plan_output.txt
        continue-on-error: true
        env:
          TF_LOG: INFO

      - name: Comment PR with Terraform Plan
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infra/plan_output.txt', 'utf8');

            const comment = `## 📋 Terraform Plan

            \`\`\`
            ${planOutput.substring(0, 30000)}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

      - name: Archive Terraform plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          retention-days: 30

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./trivy-results.sarif
        continue-on-error: true

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      [
        python-lint,
        python-tests,
        terraform-validate,
        terraform-plan,
        security-scan,
      ]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "✅ CI Pipeline completed"
          echo "Python Linting: ${{ needs.python-lint.result }}"
          echo "Python Tests: ${{ needs.python-tests.result }}"
          echo "Terraform Validation: ${{ needs.terraform-validate.result }}"
          echo "Terraform Plan: ${{ needs.terraform-plan.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
